<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <title>Калькулятор с дробями</title>
  <style>
    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #0f172a;
      color: #e5e7eb;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
    }
    .card {
      background: #020617;
      border-radius: 16px;
      padding: 24px 28px;
      box-shadow: 0 24px 60px rgba(15, 23, 42, 0.9);
      width: 100%;
      max-width: 520px;
      border: 1px solid rgba(148, 163, 184, 0.3);
    }
    h1 {
      font-size: 22px;
      margin: 0 0 6px;
    }
    .subtitle {
      font-size: 13px;
      color: #9ca3af;
      margin-bottom: 18px;
    }
    label {
      display: block;
      font-size: 13px;
      margin-bottom: 6px;
      color: #d1d5db;
    }
    input[type="text"] {
      width: 100%;
      padding: 10px 12px;
      border-radius: 10px;
      border: 1px solid #4b5563;
      background: #020617;
      color: #e5e7eb;
      font-size: 14px;
      outline: none;
      box-sizing: border-box;
    }
    input[type="text"]:focus {
      border-color: #22c55e;
      box-shadow: 0 0 0 1px rgba(34, 197, 94, 0.4);
    }
    .hint {
      font-size: 12px;
      color: #9ca3af;
      margin-top: 4px;
      margin-bottom: 14px;
    }
    button {
      padding: 9px 16px;
      border-radius: 999px;
      border: none;
      cursor: pointer;
      background: linear-gradient(135deg, #22c55e, #4ade80);
      color: #022c22;
      font-weight: 600;
      font-size: 14px;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      margin-top: 4px;
    }
    button:hover {
      filter: brightness(1.05);
    }
    button:active {
      transform: translateY(1px);
    }
    .results {
      margin-top: 18px;
      padding-top: 14px;
      border-top: 1px solid #1f2937;
      font-size: 14px;
    }
    .results-row {
      margin-bottom: 6px;
    }
    .label {
      color: #9ca3af;
      margin-right: 4px;
    }
    .value {
      color: #e5e7eb;
      font-weight: 500;
    }
    .error {
      margin-top: 10px;
      font-size: 13px;
      color: #fecaca;
    }
    .examples {
      margin-top: 10px;
      font-size: 12px;
      color: #9ca3af;
    }
    .examples code {
      background: #020617;
      padding: 2px 5px;
      border-radius: 6px;
      border: 1px solid #1f2937;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Калькулятор с дробями</h1>
    <div class="subtitle">Поддерживаются операции +, −, ×, ÷, скобки и обычные дроби вида 1/2.</div>

    <label for="expr">Выражение</label>
    <input id="expr" type="text" placeholder="Например: 1/2 + 3/4 * (2 - 1/3)" />
    <div class="hint">Используйте формат: 1/2, 3/4, 2 и операторы + - * / ( ).</div>

    <button id="calcBtn">Посчитать</button>

    <div class="results" id="results" style="display: none;">
      <div class="results-row">
        <span class="label">Результат (дробь):</span>
        <span class="value" id="fractionResult"></span>
      </div>
      <div class="results-row">
        <span class="label">В десятичном виде:</span>
        <span class="value" id="decimalResult"></span>
      </div>
    </div>

    <div class="error" id="error" style="display: none;"></div>

    <div class="examples">
      Примеры:<br />
      <code>1/2 + 3/4</code><br />
      <code>(1/3 + 1/6) / 2</code><br />
      <code>5/2 / 3/4 - 1</code>
    </div>
  </div>

  <script>
    function gcd(a, b) {
      a = Math.abs(a);
      b = Math.abs(b);
      while (b !== 0) {
        const t = b;
        b = a % b;
        a = t;
      }
      return a || 1;
    }

    function makeFraction(n, d) {
      if (d === 0) {
        throw new Error("Деление на ноль");
      }
      if (d < 0) {
        n = -n;
        d = -d;
      }
      const g = gcd(n, d);
      return { n: n / g, d: d / g };
    }

    function parseNumber(token) {
      if (token.includes("/")) {
        const [numStr, denStr] = token.split("/");
        const n = parseInt(numStr, 10);
        const d = parseInt(denStr, 10);
        if (Number.isNaN(n) || Number.isNaN(d)) {
          throw new Error("Некорректная дробь: " + token);
        }
        return makeFraction(n, d);
      }
      const n = parseInt(token, 10);
      if (Number.isNaN(n)) {
        throw new Error("Некорректное число: " + token);
      }
      return makeFraction(n, 1);
    }

    function tokenize(expr) {
      const tokens = [];
      let number = "";
      const compact = expr.replace(/\s+/g, "");
      for (const ch of compact) {
        if (/\d/.test(ch) || (ch === "/" && number !== "")) {
          number += ch;
        } else if ("+-*/()".includes(ch)) {
          if (number) {
            tokens.push(number);
            number = "";
          }
          tokens.push(ch);
        } else {
          throw new Error("Недопустимый символ: " + ch);
        }
      }
      if (number) {
        tokens.push(number);
      }
      return tokens;
    }

    function toRpn(tokens) {
      const precedence = { "+": 1, "-": 1, "*": 2, "/": 2 };
      const output = [];
      const ops = [];
      for (const token of tokens) {
        if (/\d/.test(token[0])) {
          output.push(token);
        } else if (token in precedence) {
          while (
            ops.length &&
            ops[ops.length - 1] in precedence &&
            precedence[ops[ops.length - 1]] >= precedence[token]
          ) {
            output.push(ops.pop());
          }
          ops.push(token);
        } else if (token === "(") {
          ops.push(token);
        } else if (token === ")") {
          while (ops.length && ops[ops.length - 1] !== "(") {
            output.push(ops.pop());
          }
          if (!ops.length) {
            throw new Error("Несогласованные скобки");
          }
          ops.pop();
        } else {
          throw new Error("Неизвестный токен: " + token);
        }
      }
      while (ops.length) {
        const op = ops.pop();
        if (op === "(" || op === ")") {
          throw new Error("Несогласованные скобки");
        }
        output.push(op);
      }
      return output;
    }

    function evalRpn(tokens) {
      const stack = [];
      for (const token of tokens) {
        if (/\d/.test(token[0])) {
          stack.push(parseNumber(token));
        } else {
          if (stack.length < 2) {
            throw new Error("Неверное выражение");
          }
          const b = stack.pop();
          const a = stack.pop();
          let res;
          if (token === "+") {
            res = makeFraction(a.n * b.d + b.n * a.d, a.d * b.d);
          } else if (token === "-") {
            res = makeFraction(a.n * b.d - b.n * a.d, a.d * b.d);
          } else if (token === "*") {
            res = makeFraction(a.n * b.n, a.d * b.d);
          } else if (token === "/") {
            res = makeFraction(a.n * b.d, a.d * b.n);
          } else {
            throw new Error("Неизвестный оператор: " + token);
          }
          stack.push(res);
        }
      }
      if (stack.length !== 1) {
        throw new Error("Неверное выражение");
      }
      return stack[0];
    }

    function calculate(expr) {
      const tokens = tokenize(expr);
      const rpn = toRpn(tokens);
      return evalRpn(rpn);
    }

    function formatFraction(fr) {
      if (fr.d === 1) return String(fr.n);
      return fr.n + "/" + fr.d;
    }

    const input = document.getElementById("expr");
    const btn = document.getElementById("calcBtn");
    const resultsBlock = document.getElementById("results");
    const errorBlock = document.getElementById("error");
    const fractionResult = document.getElementById("fractionResult");
    const decimalResult = document.getElementById("decimalResult");

    function runCalculation() {
      const expr = input.value.trim();
      errorBlock.style.display = "none";
      resultsBlock.style.display = "none";
      if (!expr) return;

      try {
        const fr = calculate(expr);
        fractionResult.textContent = formatFraction(fr);
        decimalResult.textContent = Number(fr.n / fr.d).toString();
        resultsBlock.style.display = "block";
      } catch (e) {
        errorBlock.textContent = "Ошибка: " + e.message;
        errorBlock.style.display = "block";
      }
    }

    btn.addEventListener("click", runCalculation);
    input.addEventListener("keydown", function (e) {
      if (e.key === "Enter") {
        runCalculation();
      }
    });
  </script>
</body>
</html>

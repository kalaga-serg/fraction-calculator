<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <title>Калькулина</title>
  <style>
    :root {
      --bg-top: #07111f;
      --bg-bottom: #020617;
      --card-border: rgba(125, 211, 252, 0.22);
      --text-main: #e5eefc;
      --text-muted: #9fb3c8;
      --accent-green: #34d399;
      --accent-blue: #60a5fa;
      --accent-cyan: #67e8f9;
    }
    body {
      font-family: "Trebuchet MS", "Segoe UI", sans-serif;
      background:
        radial-gradient(circle at top left, rgba(52, 211, 153, 0.18), transparent 30%),
        radial-gradient(circle at 85% 12%, rgba(96, 165, 250, 0.2), transparent 28%),
        radial-gradient(circle at 50% 100%, rgba(251, 191, 36, 0.08), transparent 24%),
        linear-gradient(180deg, var(--bg-top), var(--bg-bottom));
      color: var(--text-main);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
    }
    .card {
      position: relative;
      background:
        linear-gradient(180deg, rgba(15, 23, 42, 0.86), rgba(2, 6, 23, 0.94)),
        rgba(4, 10, 24, 0.92);
      border-radius: 24px;
      padding: 24px 28px;
      box-shadow: 0 28px 80px rgba(2, 6, 23, 0.62);
      width: 100%;
      max-width: 520px;
      border: 1px solid var(--card-border);
      backdrop-filter: blur(16px);
      overflow: hidden;
    }
    .card::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        linear-gradient(135deg, rgba(103, 232, 249, 0.1), transparent 36%),
        radial-gradient(circle at top right, rgba(52, 211, 153, 0.12), transparent 28%);
      pointer-events: none;
    }
    .brand-mark {
      position: relative;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 6px 11px;
      margin-bottom: 12px;
      border-radius: 999px;
      background: rgba(15, 23, 42, 0.72);
      border: 1px solid rgba(103, 232, 249, 0.2);
      color: var(--accent-cyan);
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }
    .brand-mark::before {
      content: "";
      width: 8px;
      height: 8px;
      border-radius: 999px;
      background: linear-gradient(135deg, var(--accent-green), var(--accent-blue));
      box-shadow: 0 0 12px rgba(96, 165, 250, 0.55);
    }
    h1 {
      position: relative;
      font-family: Georgia, "Times New Roman", serif;
      font-size: 30px;
      line-height: 1;
      letter-spacing: -0.04em;
      margin: 0 0 8px;
      color: #f8fafc;
    }
    .title-accent {
      background: linear-gradient(135deg, var(--accent-cyan), var(--accent-green));
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }
    .subtitle {
      font-size: 13px;
      color: var(--text-muted);
      margin-bottom: 20px;
      max-width: 38ch;
    }
    label {
      display: block;
      font-size: 13px;
      margin-bottom: 6px;
      color: #cfe1f6;
    }
    input[type="text"] {
      width: 100%;
      padding: 10px 12px;
      border-radius: 14px;
      border: 1px solid rgba(125, 211, 252, 0.16);
      background: rgba(2, 6, 23, 0.75);
      color: var(--text-main);
      font-size: 14px;
      outline: none;
      box-sizing: border-box;
    }
    input[type="text"]:focus {
      border-color: var(--accent-cyan);
      box-shadow: 0 0 0 1px rgba(103, 232, 249, 0.45), 0 0 0 6px rgba(96, 165, 250, 0.08);
    }
    .hint {
      font-size: 12px;
      color: var(--text-muted);
      margin-top: 4px;
      margin-bottom: 14px;
    }
    button {
      padding: 9px 16px;
      border-radius: 999px;
      border: none;
      cursor: pointer;
      background: linear-gradient(135deg, var(--accent-green), var(--accent-cyan));
      color: #042f2e;
      font-weight: 600;
      font-size: 14px;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      margin-top: 4px;
      box-shadow: 0 12px 24px rgba(52, 211, 153, 0.18);
    }
    button:hover {
      filter: brightness(1.05);
    }
    button:active {
      transform: translateY(1px);
    }
    .results {
      margin-top: 22px;
      padding-top: 18px;
      border-top: 1px solid rgba(148, 163, 184, 0.18);
    }
    .empty-state {
      margin-top: 20px;
      padding-top: 18px;
      border-top: 1px solid rgba(148, 163, 184, 0.12);
    }
    .empty-card {
      padding: 16px 18px;
      border-radius: 16px;
      border: 1px dashed rgba(148, 163, 184, 0.2);
      background:
        radial-gradient(circle at top left, rgba(59, 130, 246, 0.08), transparent 34%),
        rgba(15, 23, 42, 0.56);
    }
    .empty-title {
      margin: 0 0 6px;
      font-size: 14px;
      font-weight: 600;
      color: #f8fafc;
    }
    .empty-copy {
      margin: 0;
      font-size: 13px;
      line-height: 1.5;
      color: #94a3b8;
    }
    .empty-copy strong {
      color: #dbeafe;
      font-weight: 600;
    }
    .result-card {
      position: relative;
      overflow: hidden;
      padding: 18px 18px 16px;
      border-radius: 18px;
      border: 1px solid rgba(59, 130, 246, 0.22);
      background:
        radial-gradient(circle at top right, rgba(34, 197, 94, 0.14), transparent 34%),
        linear-gradient(180deg, rgba(15, 23, 42, 0.98), rgba(2, 6, 23, 0.96));
      box-shadow: 0 18px 44px rgba(2, 6, 23, 0.4);
    }
    .results-row {
      margin-bottom: 10px;
    }
    .label {
      color: #9ca3af;
      margin-right: 4px;
    }
    .value {
      color: #e5e7eb;
      font-weight: 500;
    }
    .result-kicker {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 5px 10px;
      border-radius: 999px;
      background: rgba(15, 23, 42, 0.78);
      border: 1px solid rgba(148, 163, 184, 0.18);
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #86efac;
      margin-bottom: 14px;
    }
    .result-primary {
      margin-bottom: 14px;
    }
    .result-caption {
      display: block;
      margin-bottom: 6px;
      font-size: 12px;
      color: #93c5fd;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }
    .result-number {
      display: block;
      font-size: 31px;
      line-height: 1.08;
      letter-spacing: -0.03em;
      font-weight: 700;
      color: #f8fafc;
      word-break: break-word;
      text-wrap: balance;
    }
    .result-meta {
      display: grid;
      grid-template-columns: 108px 1fr;
      gap: 8px 12px;
      align-items: start;
      padding: 12px 0 0;
      border-top: 1px solid rgba(148, 163, 184, 0.14);
    }
    .result-meta .label {
      margin: 0;
      font-size: 12px;
      line-height: 1.4;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: #64748b;
    }
    .result-meta .value {
      min-width: 0;
      font-size: 15px;
      line-height: 1.45;
      color: #dbeafe;
      word-break: break-word;
    }
    .result-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 16px;
      padding-top: 14px;
      border-top: 1px solid rgba(148, 163, 184, 0.14);
    }
    .error {
      margin-top: 10px;
      font-size: 13px;
      color: #fecaca;
    }
    .examples {
      margin-top: 14px;
      font-size: 12px;
      color: #9ca3af;
    }
    .examples-title {
      margin-bottom: 8px;
      color: #d6e3f4;
      font-size: 12px;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }
    .examples-list {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }
    .example-chip {
      padding: 7px 11px;
      border-radius: 999px;
      border: 1px solid rgba(125, 211, 252, 0.18);
      background: rgba(15, 23, 42, 0.76);
      color: #dff4ff;
      font-size: 12px;
      line-height: 1.2;
      cursor: pointer;
      transition: border-color 0.15s ease, transform 0.15s ease, background 0.15s ease;
    }
    .example-chip:hover {
      background: rgba(20, 34, 55, 0.95);
      border-color: rgba(103, 232, 249, 0.62);
      transform: translateY(-1px);
    }
    .example-chip:focus-visible {
      outline: 2px solid rgba(59, 130, 246, 0.8);
      outline-offset: 2px;
    }
    .btn-use {
      margin-top: 0;
      padding: 6px 12px;
      font-size: 13px;
      background: rgba(30, 58, 95, 0.72);
      color: #bfdbfe;
      border: 1px solid rgba(96, 165, 250, 0.72);
      box-shadow: none;
    }
    .history-block {
      margin-top: 16px;
      padding-top: 12px;
      border-top: 1px solid rgba(148, 163, 184, 0.12);
    }
    .history-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }
    .history-title {
      font-size: 11px;
      color: #64748b;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }
    .history-toggle {
      padding: 5px 10px;
      border-radius: 999px;
      border: 1px solid rgba(148, 163, 184, 0.16);
      background: rgba(15, 23, 42, 0.56);
      color: #94a3b8;
      font-size: 12px;
      cursor: pointer;
    }
    .history-toggle:hover {
      border-color: rgba(59, 130, 246, 0.45);
      color: #dbeafe;
    }
    .history-toggle:focus-visible {
      outline: 2px solid rgba(59, 130, 246, 0.8);
      outline-offset: 2px;
    }
    .history-list {
      list-style: none;
      margin: 10px 0 0;
      padding: 0;
      font-size: 12px;
      display: none;
    }
    .history-block.is-open .history-list {
      display: block;
    }
    .history-list li {
      padding: 5px 9px;
      margin-bottom: 4px;
      background: rgba(15, 23, 42, 0.42);
      border-radius: 8px;
      border: 1px solid rgba(148, 163, 184, 0.1);
      cursor: pointer;
      color: #cbd5e1;
      transition: border-color 0.15s ease, background 0.15s ease;
    }
    .history-list li:hover {
      background: rgba(30, 41, 59, 0.82);
      border-color: rgba(59, 130, 246, 0.42);
    }
    @media (max-width: 640px) {
      .card {
        padding: 20px 18px;
      }
      .brand-mark {
        margin-bottom: 10px;
      }
      h1 {
        font-size: 26px;
      }
      .result-card {
        padding: 16px 14px 14px;
      }
      .result-number {
        font-size: 24px;
      }
      .result-meta {
        grid-template-columns: 1fr;
        gap: 4px;
      }
      .result-actions {
        flex-direction: column;
      }
      .result-actions button {
        width: 100%;
        justify-content: center;
      }
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="brand-mark">Галина + калькулятор</div>
    <h1>Кальку<span class="title-accent">лина</span></h1>
    <div class="subtitle">Дроби, десятичные числа, скобки и базовые операции.</div>

    <label for="expr">Выражение</label>
    <input id="expr" type="text" placeholder="Например: 1/2 + 1.5 * 2 или (1/3 + 0.25) / 2" />
    <div class="hint">Например: 1/2 + 0.25 * 3</div>

    <button id="calcBtn">Посчитать</button>

    <div class="empty-state" id="emptyState">
      <div class="empty-card">
        <p class="empty-title">Начните с выражения</p>
        <p class="empty-copy">Введите своё выражение или нажмите на один из <strong>быстрых примеров</strong> ниже.</p>
      </div>
    </div>

    <div class="results" id="results" style="display: none;">
      <div class="result-card">
        <div class="result-kicker">Ответ</div>
        <div class="result-primary">
          <span class="result-caption">Основной результат</span>
          <span class="result-number" id="decimalResult"></span>
        </div>
        <div class="result-meta" id="fractionRow">
          <span class="label">Дробь</span>
          <span class="value" id="fractionResult"></span>
        </div>
        <div class="result-actions">
          <button
            type="button"
            id="useResultBtn"
            class="btn-use"
            title="Подставить текущий результат в поле ввода"
          >
            Подставить в выражение
          </button>
        </div>
      </div>
    </div>

    <div class="error" id="error" style="display: none;"></div>

    <div class="history-block" id="historyBlock" style="display: none;">
      <div class="history-header">
        <div class="history-title" id="historyTitle">Последние вычисления</div>
        <button type="button" class="history-toggle" id="historyToggleBtn" aria-expanded="false">Показать</button>
      </div>
      <ul class="history-list" id="historyList"></ul>
    </div>

    <div class="examples" id="examplesBlock">
      <div class="examples-title">Быстрые примеры</div>
      <div class="examples-list">
        <button type="button" class="example-chip" data-example="1/2 + 3/4">1/2 + 3/4</button>
        <button type="button" class="example-chip" data-example="2.5 * 4 + 0.1">2.5 * 4 + 0.1</button>
        <button type="button" class="example-chip" data-example="(1/3 + 0.25) / 2">(1/3 + 0.25) / 2</button>
      </div>
    </div>
  </div>

  <script>
    function absBigInt(value) {
      return value < 0n ? -value : value;
    }

    function gcd(a, b) {
      a = absBigInt(a);
      b = absBigInt(b);
      while (b !== 0n) {
        const t = b;
        b = a % b;
        a = t;
      }
      return a || 1n;
    }

    function makeFraction(n, d) {
      if (d === 0n) {
        throw new Error("Деление на ноль");
      }
      if (d < 0n) {
        n = -n;
        d = -d;
      }
      const g = gcd(n, d);
      return { n: n / g, d: d / g };
    }

    function parseBigIntValue(raw, errorPrefix) {
      if (!/^[+-]?\d+$/.test(raw)) {
        throw new Error(errorPrefix + raw);
      }
      return BigInt(raw);
    }

    function parseNumber(token) {
      if (token.includes("/") && !token.includes(".")) {
        const parts = token.split("/");
        if (parts.length !== 2) {
          throw new Error("Некорректная дробь: " + token);
        }
        const [numStr, denStr] = parts;
        const n = parseBigIntValue(numStr, "Некорректная дробь: ");
        const d = parseBigIntValue(denStr, "Некорректная дробь: ");
        return makeFraction(n, d);
      }
      if (token.includes(".")) {
        const negative = token.startsWith("-");
        const normalized = negative ? token.slice(1) : token;
        const parts = normalized.split(".");
        if (parts.length !== 2) {
          throw new Error("Некорректное число: " + token);
        }
        const intPart = parseBigIntValue(parts[0] || "0", "Некорректное число: ");
        const fracStr = parts[1] || "";
        if (!/^\d*$/.test(fracStr)) {
          throw new Error("Некорректное число: " + token);
        }
        const den = 10n ** BigInt(fracStr.length);
        const fracPart = parseBigIntValue(fracStr || "0", "Некорректное число: ");
        const unsignedNumerator = intPart * den + fracPart;
        const n = negative ? -unsignedNumerator : unsignedNumerator;
        return makeFraction(n, den);
      }
      const n = parseBigIntValue(token, "Некорректное число: ");
      return makeFraction(n, 1n);
    }

    function tokenize(expr) {
      const tokens = [];
      let number = "";
      const compact = expr.replace(/\s+/g, "");
      for (const ch of compact) {
        if (/\d/.test(ch)) {
          number += ch;
        } else if (ch === ".") {
          if (number.includes(".") || number.includes("/")) {
            throw new Error("Некорректное число");
          }
          number += ch;
        } else if (ch === "/") {
          if (number.includes(".")) {
            if (number) {
              tokens.push(number);
              number = "";
            }
            tokens.push(ch);
          } else {
            number += ch;
          }
        } else if ("+-*/()".includes(ch)) {
          if (number) {
            tokens.push(number);
            number = "";
          }
          tokens.push(ch);
        } else {
          throw new Error("Недопустимый символ: " + ch);
        }
      }
      if (number) {
        tokens.push(number);
      }
      return tokens;
    }

    function isNumberToken(token) {
      return /^[\d.]/.test(token) || (token.length > 1 && token.includes("/"));
    }

    function toRpn(tokens) {
      const precedence = { "+": 1, "-": 1, "*": 2, "/": 2 };
      const output = [];
      const ops = [];
      for (const token of tokens) {
        if (isNumberToken(token)) {
          output.push(token);
        } else if (token in precedence) {
          while (
            ops.length &&
            ops[ops.length - 1] in precedence &&
            precedence[ops[ops.length - 1]] >= precedence[token]
          ) {
            output.push(ops.pop());
          }
          ops.push(token);
        } else if (token === "(") {
          ops.push(token);
        } else if (token === ")") {
          while (ops.length && ops[ops.length - 1] !== "(") {
            output.push(ops.pop());
          }
          if (!ops.length) {
            throw new Error("Несогласованные скобки");
          }
          ops.pop();
        } else {
          throw new Error("Неизвестный токен: " + token);
        }
      }
      while (ops.length) {
        const op = ops.pop();
        if (op === "(" || op === ")") {
          throw new Error("Несогласованные скобки");
        }
        output.push(op);
      }
      return output;
    }

    function evalRpn(tokens) {
      const stack = [];
      for (const token of tokens) {
        if (isNumberToken(token)) {
          stack.push(parseNumber(token));
        } else {
          if (stack.length < 2) {
            throw new Error("Неверное выражение");
          }
          const b = stack.pop();
          const a = stack.pop();
          let res;
          if (token === "+") {
            res = makeFraction(a.n * b.d + b.n * a.d, a.d * b.d);
          } else if (token === "-") {
            res = makeFraction(a.n * b.d - b.n * a.d, a.d * b.d);
          } else if (token === "*") {
            res = makeFraction(a.n * b.n, a.d * b.d);
          } else if (token === "/") {
            res = makeFraction(a.n * b.d, a.d * b.n);
          } else {
            throw new Error("Неизвестный оператор: " + token);
          }
          stack.push(res);
        }
      }
      if (stack.length !== 1) {
        throw new Error("Неверное выражение");
      }
      return stack[0];
    }

    function calculate(expr) {
      const tokens = tokenize(expr);
      const rpn = toRpn(tokens);
      return evalRpn(rpn);
    }

    function formatFraction(fr) {
      if (fr.d === 1n) return fr.n.toString();
      return fr.n.toString() + "/" + fr.d.toString();
    }

    function formatDecimal(value, maxDecimals) {
      const limit = maxDecimals || 15;
      const sign = value.n < 0n ? "-" : "";
      const numerator = absBigInt(value.n);
      const denominator = value.d;
      const integerPart = numerator / denominator;
      let remainder = numerator % denominator;

      if (remainder === 0n) {
        return sign + integerPart.toString();
      }

      let fractionalDigits = "";

      for (let i = 0; i < limit && remainder !== 0n; i += 1) {
        remainder *= 10n;
        const digit = remainder / denominator;
        fractionalDigits += digit.toString();
        remainder %= denominator;
      }

      return sign + integerPart.toString() + "." + fractionalDigits;
    }

    const input = document.getElementById("expr");
    const btn = document.getElementById("calcBtn");
    const emptyState = document.getElementById("emptyState");
    const resultsBlock = document.getElementById("results");
    const errorBlock = document.getElementById("error");
    const fractionResult = document.getElementById("fractionResult");
    const decimalResult = document.getElementById("decimalResult");
    const useResultBtn = document.getElementById("useResultBtn");
    const historyBlock = document.getElementById("historyBlock");
    const historyTitle = document.getElementById("historyTitle");
    const historyList = document.getElementById("historyList");
    const historyToggleBtn = document.getElementById("historyToggleBtn");
    const examplesBlock = document.getElementById("examplesBlock");

    const MAX_HISTORY = 10;
    let calculationHistory = [];
    let lastResultFraction = null;
    let isHistoryExpanded = false;
    let hasSuccessfulCalculation = false;

    function setHistoryExpanded(expanded) {
      isHistoryExpanded = expanded;
      historyBlock.classList.toggle("is-open", expanded);
      historyToggleBtn.setAttribute("aria-expanded", expanded ? "true" : "false");
      historyToggleBtn.textContent = expanded ? "Скрыть" : "Показать";
    }

    function renderHistory() {
      if (calculationHistory.length === 0) {
        historyBlock.style.display = "none";
        setHistoryExpanded(false);
        return;
      }
      historyBlock.style.display = "block";
      historyTitle.textContent = "Последние вычисления (" + calculationHistory.length + ")";
      setHistoryExpanded(isHistoryExpanded);
      historyList.innerHTML = calculationHistory.map(function (entry, index) {
        const dec = formatDecimal(entry.result, 15);
        return (
          '<li data-index="' +
          index +
          '" title="Нажмите, чтобы подставить результат и продолжить">' +
          escapeHtml(entry.expr) +
          " = " +
          escapeHtml(dec) +
          "</li>"
        );
      }).join("");
    }

    function escapeHtml(s) {
      const div = document.createElement("div");
      div.textContent = s;
      return div.innerHTML;
    }

    function runCalculation() {
      const raw = input.value.trim();
      // allow comma as decimal separator
      const expr = raw.replace(/,/g, ".");
      errorBlock.style.display = "none";
      resultsBlock.style.display = "none";
      emptyState.style.display = hasSuccessfulCalculation ? "none" : "block";
      if (!expr) return;

      try {
        const fr = calculate(expr);
        lastResultFraction = fr;
        const decStr = formatDecimal(fr, 15);
        fractionResult.textContent = formatFraction(fr);
        decimalResult.textContent = decStr;
        hasSuccessfulCalculation = true;
        emptyState.style.display = "none";
        resultsBlock.style.display = "block";

        calculationHistory.unshift({
          expr: raw,
          result: fr,
          decimalStr: decStr
        });
        if (calculationHistory.length > MAX_HISTORY) {
          calculationHistory = calculationHistory.slice(0, MAX_HISTORY);
        }
        renderHistory();

      } catch (e) {
        errorBlock.textContent = "Ошибка: " + e.message;
        errorBlock.style.display = "block";
      }
    }

    useResultBtn.addEventListener("click", function () {
      if (lastResultFraction) {
        input.value = formatDecimal(lastResultFraction, 15);
        input.focus();
      }
    });

    historyList.addEventListener("click", function (e) {
      const li = e.target.closest("li[data-index]");
      if (!li) return;
      const index = parseInt(li.getAttribute("data-index"), 10);
      const entry = calculationHistory[index];
      if (entry) {
        input.value = entry.decimalStr;
        input.focus();
      }
    });

    historyToggleBtn.addEventListener("click", function () {
      setHistoryExpanded(!isHistoryExpanded);
    });

    examplesBlock.addEventListener("click", function (e) {
      const chip = e.target.closest("button[data-example]");
      if (!chip) return;
      input.value = chip.getAttribute("data-example") || "";
      input.focus();
    });

    btn.addEventListener("click", runCalculation);
    input.addEventListener("keydown", function (e) {
      if (e.key === "Enter") {
        runCalculation();
      }
    });
  </script>
</body>
</html>
